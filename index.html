<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Outfit:wght@300;500;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="background-effects">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <main class="glass-container">
        <div id="countdown-view" class="view">
            <h1 class="title">Almost Time...</h1>
            <p class="subtitle">For someone very special ❤️</p>
            <div class="countdown" id="countdown">
                <div class="time-box">
                    <span id="hours">00</span>
                    <span class="label">Hours</span>
                </div>
                <div class="time-box">
                    <span id="minutes">00</span>
                    <span class="label">Minutes</span>
                </div>
                <div class="time-box">
                    <span id="seconds">00</span>
                    <span class="label">Seconds</span>
                </div>
            </div>
        </div>

        <div id="celebration-view" class="view hidden">
            <h1 class="title bday-text">Happy Birthday!</h1>
            <h2 class="sister-text">To My Cute Sister</h2>
            <div class="message">
                <p>Wishing you a day filled with happiness, laughter, and beautiful memories. You are the best sister in
                    the entire world! 💖</p>
            </div>
            <button id="gift-btn" class="glow-btn"> Open Your Small Surprise 🎁</button>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
