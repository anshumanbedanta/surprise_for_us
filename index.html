<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="background-effects">
        <!-- Floating hearts and bokeh -->
        <div class="bokeh b1"></div>
        <div class="bokeh b2"></div>
        <div class="bokeh b3"></div>
        <div class="bokeh b4"></div>
        <!-- Balloons: mix of sharp (visible) and blurred -->
        <div class="balloon bal1"></div>
        <div class="balloon bal2"></div>
        <div class="balloon bal3"></div>
        <div class="balloon bal4"></div>
        <div class="balloon bal5 blurred"></div>
        <div class="balloon bal6 blurred"></div>
        <div class="balloon bal7"></div>
        <div class="balloon bal8 blurred"></div>
        <div class="heart h1"></div>
        <div class="heart h2"></div>
        <div class="heart h3"></div>
    </div>

    <main class="glass-card-main">
        <div id="countdown-view" class="view">
            <h1 class="main-title">A Special Day Is About To Begin...</h1>
            <p class="subtitle">Counting down to someone who deserves<br>all the happiness in the world ❤️</p>

            <div class="timer-box" id="countdown">
                <div class="time-col">
                    <span id="days" class="time-num">00</span>
                    <span class="time-label">DAYS</span>
                </div>
                <div class="colon">:</div>
                <div class="time-col">
                    <span id="hours" class="time-num">00</span>
                    <span class="time-label">HOURS</span>
                </div>
                <div class="colon">:</div>
                <div class="time-col">
                    <span id="minutes" class="time-num">00</span>
                    <span class="time-label">MINUTES</span>
                </div>
                <div class="colon">:</div>
                <div class="time-col">
                    <span id="seconds" class="time-num">00</span>
                    <span class="time-label">SECONDS</span>
                </div>
            </div>
        </div>

        <div id="celebration-view" class="view hidden">
            <div class="celebration-content">
                <div class="photo-container">
                    <div class="butterfly-frame">
                        <img src="images/image6.jpg" alt="Birthday Girl" class="birthday-photo">

                            </svg>
                        </div>
                        <div class="butterfly-bottom-left">

                                xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M495.2 24.3c-28.7-24-74.6-27.4-106.6-8.5-34.1 20.1-51.1 55.4-74.8 89.2-13.4 19.1-30.2 41.5-49 59.8-1.5 1.5-3.3 2.8-5 4.3l.3.3c-1.3-1.2-2.6-2.3-3.8-3.6-18.7-18.3-35.4-40.6-48.8-59.6-23.7-33.8-40.8-69.2-74.8-89.2-32-19-77.9-15.5-106.6 8.5C1.6 44.5-9.6 83.1 9.4 113.8c12.2 19.6 30 35.5 49.3 49 39.8 27.8 88.5 44 136.6 53.6-8.2-1-16.1-2.4-23.9-4.2-30.8-7.2-61.9-17-91.8-29.4-49.8-20.7-98-50.6-121.2-101.4-9.3 35.8-2 73.9 20 102.3 22 28.5 56.6 47 91.8 55.6 37 9 75 11 112.5 7 13.9-1.5 27.7-3.6 41.4-6.4v40.3c0 9.8 4.2 18.2 10.3 22.8-1.8 14.1-1.5 28.4 1.3 42.4 4.5 22.4 15.3 43.1 30.7 59.4 4.1 4.3 9.4 7.6 15.4 9.1 7.2 1.8 14.7 1.2 21.6-2 6-2.7 10.9-7.3 14-13 8.3-15.1 11.5-32.3 9.3-49.2-1.3-10-4.1-19.8-8.2-29 5.3-4.5 8.7-11.7 8.7-20.1v-36c13.4 2.6 26.8 4.6 40.4 6 36.8 3.8 74 1.8 110.2-7.1 34.4-8.4 68.2-26.6 89.9-54.6 22-28.5 29.3-66.6 20-102.3-23.2 50.9-71.5 80.7-121.3 101.5-29.9 12.5-61 22.2-91.8 29.4-7.8 1.8-15.7 3.1-24 4.2 48.1-9.6 96.8-25.9 136.6-53.6 19.3-13.4 37.1-29.3 49.3-49 19.1-30.8 7.8-69.4-16.7-89.5z" />
                            </svg>
                        </div>
                    </div>
                </div>

                <div class="text-container">
                    <h1 class="bday-text">Happy Birthday Bby <span class="red-heart">❤️</span></h1>

                    <div class="little-note">
                        <h3 class="note-title">A Little Note For You...</h3>
                        <div class="typewriter"><span class="cursor">|</span></div>
                    </div>
                </div>

                <div class="footer">
                    <p>Made with ❤️ for you, Pooja</p>
                </div>
            </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
